<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-First Developer | Portfolio Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background: #020617; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; }
        #game-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s ease-out; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(59, 130, 246, 0.1); border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .title { margin-top: 24px; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 20px; color: #3b82f6; letter-spacing: 6px; }
        .ui-hints { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 13px; font-family: 'Inter', sans-serif; opacity: 0.6; letter-spacing: 2px; color: #94a3b8; pointer-events: none; z-index: 10; display: flex; gap: 24px; text-transform: uppercase; border: 1px solid rgba(59, 130, 246, 0.2); padding: 12px 24px; border-radius: 40px; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); white-space: nowrap; }
        @media (max-width: 768px) {
            .ui-hints { bottom: 15px; font-size: 10px; gap: 12px; padding: 8px 16px; }
            .hint-key { padding: 1px 4px; border-radius: 4px; font-size: 9px; }
        }
        .hint-key { color: #3b82f6; font-weight: 700; border: 1px solid #3b82f677; padding: 2px 8px; border-radius: 6px; margin-right: 4px; font-size: 11px; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="title">CORE_INITIALIZED</div>
    </div>
    <div id="game-container"></div>
    <div class="ui-hints">
        <div><span class="hint-key">WASD</span> TO MOVE</div>
        <div><span class="hint-key">E</span> TO INTERACT</div>
        <div><span class="hint-key">ESC</span> TO CLOSE</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const ls = document.getElementById('loading-screen');
                if (ls) ls.style.opacity = '0';
                setTimeout(() => { if (ls) ls.remove(); }, 500);
            }, 1000);
        });
    </script>
</body>
</html>
